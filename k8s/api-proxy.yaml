apiVersion: v1
kind: Namespace
metadata:
  name: api-proxy
---
apiVersion: v1
kind: Secret
metadata:
  name: api-proxy-secret
  namespace: api-proxy
type: Opaque
stringData:
  # Replace all values before production use.
  APP_SECRET: "change-this-to-a-long-random-secret"
  EMAIL_VERIFY_SECRET: "change-this-to-a-long-random-email-secret"
  POSTGRES_PASSWORD: "change-this-postgres-password"
  DATABASE_URL: "postgres://api_proxy:change-this-postgres-password@postgres:5432/api_proxy"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-proxy-config
  namespace: api-proxy
data:
  NODE_ENV: "production"
  PORT: "3000"
  HOSTNAME: "0.0.0.0"
  DATABASE_POOL_SIZE: "20"
  REDIS_URL: "redis://redis:6379"
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: api-proxy
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: api-proxy
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: api_proxy
            - name: POSTGRES_USER
              value: api_proxy
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: api-proxy-secret
                  key: POSTGRES_PASSWORD
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "api_proxy", "-d", "api_proxy"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "api_proxy", "-d", "api_proxy"]
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: api-proxy
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: api-proxy
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          volumeMounts:
            - name: redis-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: api-proxy
  namespace: api-proxy
spec:
  selector:
    app: api-proxy
  ports:
    - name: http
      port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-proxy
  namespace: api-proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-proxy
  template:
    metadata:
      labels:
        app: api-proxy
    spec:
      # Uncomment and create the secret if your cluster needs registry credentials.
      # imagePullSecrets:
      #   - name: aliyun-registry-secret
      containers:
        - name: api-proxy
          image: registry.cn-shanghai.aliyuncs.com/ai_studio/api-proxy:v0.0.4
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: api-proxy-config
          env:
            - name: APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-proxy-secret
                  key: APP_SECRET
            - name: EMAIL_VERIFY_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-proxy-secret
                  key: EMAIL_VERIFY_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: api-proxy-secret
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-proxy
  namespace: api-proxy
  annotations:
    # Adjust for your ingress controller. Examples:
    # nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    # nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: api-proxy.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-proxy
                port:
                  number: 80
